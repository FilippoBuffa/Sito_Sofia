<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px;}
.card{background:#fff;border-radius:8px;max-width:520px;margin:0 auto;padding:32px;}
.header{background:#347A80;color:#fff;border-radius:6px 6px 0 0;padding:20px 32px;margin:-32px -32px 28px;}
.header h2{margin:0;font-size:1.2rem;}
.info{background:#f8f8f8;border-left:4px solid #347A80;padding:12px 16px;margin:16px 0;border-radius:4px;line-height:1.8;}
.btn{display:inline-block;background:#347A80;color:#fff;padding:12px 28px;border-radius:5px;text-decoration:none;font-weight:bold;margin:16px 0;}
</style></head><body>
<div class="card">
  <div class="header"><h2>Request resubmitted by client</h2></div>
  <p>The client has updated and resubmitted the request after the return.</p>
  <div class="info">
    <strong>TR#:</strong> {{ req.tr_number }}<br/>
    <strong>Service:</strong> {{ req.service.name }}<br/>
    <strong>Client:</strong> {{ req.requester.display_name }}<br/>
    <strong>Priority:</strong> {{ req.priority_label }}<br/>
  </div>
  <a href="{{ link }}" class="btn">View Request</a>
</div>
</body></html>
