<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px;}
.card{background:#fff;border-radius:8px;max-width:520px;margin:0 auto;padding:32px;}
.header{background:#347A80;color:#fff;border-radius:6px 6px 0 0;padding:20px 32px;margin:-32px -32px 28px;}
.header h2{margin:0;font-size:1.2rem;}
.footer{margin-top:24px;font-size:0.82rem;color:#888;}
</style></head><body>
<div class="card">
  <div class="header"><h2>Vernay TestLab — Verify your email</h2></div>
  <p>Hi <strong>{{ user.display_name }}</strong>,</p>
  <p>Your account has been created. To verify your email address and activate your account, open this link in your browser:</p>
  <p style="word-break:break-all;color:#347A80;">{{ link }}</p>
  <p>This link is valid for <strong>24 hours</strong>.</p>
  <div class="footer">If you did not request this account, please ignore this email.</div>
</div>
</body></html>
