<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifica email — Vernay TestLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body style="background: var(--teal-light);">

<div class="login-card card border-0">
  <div class="login-header">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Vernay" />
    <h5 class="mb-0 mt-1">Controlla la tua email</h5>
  </div>
  <div class="card-body p-4 text-center">
    <div style="font-size:3rem; color:var(--teal);">✉</div>
    <h5 class="mt-2 mb-3">Account creato!</h5>
    <p>Ti abbiamo inviato un'email di verifica al tuo indirizzo <strong>@vernay.com</strong>.</p>
    <p>Clicca il link nella mail per attivare il tuo account e poi accedi.</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary-vernay mt-2">Vai al Login</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
