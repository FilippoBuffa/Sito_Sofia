<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrati — Vernay TestLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body style="background: var(--teal-light);">

<div class="login-card card border-0" style="max-width:460px;">
  <div class="login-header">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Vernay" />
    <h5 class="mb-0 mt-1">Crea il tuo account</h5>
  </div>
  <div class="card-body p-4">
    {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Nome</label>
          <input type="text" name="first_name" class="form-control" required autofocus />
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Cognome</label>
          <input type="text" name="last_name" class="form-control" required />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email aziendale</label>
        <input type="email" name="email" class="form-control" required placeholder="nome@vernay.com" />
        <div class="form-text">Deve essere un indirizzo @vernay.com</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required minlength="8" />
        <div class="form-text">Almeno 8 caratteri</div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Conferma password</label>
        <input type="password" name="confirm_password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary-vernay w-100 fw-semibold">
        Crea account
      </button>
    </form>
    <hr class="my-3"/>
    <p class="text-center mb-0 small">Hai già un account?
      <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold" style="color:var(--teal);">Accedi</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
