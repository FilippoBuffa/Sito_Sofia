<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambia password — Vernay TestLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body style="background: var(--teal-light);">

<div class="login-card card border-0">
  <div class="login-header">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Vernay" />
    <h5 class="mb-0 mt-1">Imposta nuova password</h5>
  </div>
  <div class="card-body p-4">
    {% if current_user.must_change_password %}
    <div class="alert alert-warning py-2 mb-3">
      Per motivi di sicurezza devi impostare una nuova password prima di continuare.
    </div>
    {% endif %}
    {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('auth.change_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="mb-3">
        <label class="form-label fw-semibold">Password attuale</label>
        <input type="password" name="current_password" class="form-control" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nuova password</label>
        <input type="password" name="new_password" class="form-control" required minlength="8" />
        <div class="form-text">Almeno 8 caratteri</div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Conferma nuova password</label>
        <input type="password" name="confirm_password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary-vernay w-100 fw-semibold">
        Salva nuova password
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
